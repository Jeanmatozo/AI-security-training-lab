services:
  chatbot:
    build:
      context: ./environments/chatbot
      dockerfile: Dockerfile
    container_name: ai-sec-chatbot
    ports:
      - "8000:8000"
    volumes:
      - ./environments/chatbot/memory:/app/memory
    env_file:
      - .env

  rag-pipeline:
    build:
      context: ./environments/rag-pipeline
      dockerfile: Dockerfile
    container_name: ai-sec-rag
    ports:
      - "8001:8001"
    env_file:
      - .env
